name: install gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  install:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: brew test-bot --only-tap-syntax

      # Gate: install each formula from its (mediumcoeli-hosted) bottle. Proves the
      # published bottle URL resolves and the sha256 matches on a clean macos-26.
      - name: Install each formula from its bottle
        if: github.event_name == 'pull_request'
        run: |
          set -euxo pipefail
          brew install --force-bottle lucidaeon/tap/starcat lucidaeon/tap/blackmoon
